# Cloud Build — Frontend
# Builds and deploys the Next.js frontend to Cloud Run
# All NEXT_PUBLIC_* variables must be set as substitutions in the Cloud Build trigger.
steps:
  # 1. Build the Docker image with all NEXT_PUBLIC_* baked in
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/ecotrack-frontend:$COMMIT_SHA
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}
      - --build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_SENDER_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - --build-arg=NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_MAPS_API_KEY}
      - --build-arg=NEXT_PUBLIC_API_URL=${_BACKEND_URL}
      - ./frontend

  # 2. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/ecotrack-frontend:$COMMIT_SHA

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ecotrack-frontend
      - --image=gcr.io/$PROJECT_ID/ecotrack-frontend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

images:
  - gcr.io/$PROJECT_ID/ecotrack-frontend:$COMMIT_SHA

# Substitution variables — set these in your Cloud Build trigger
substitutions:
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_STORAGE_BUCKET: ''
  _FIREBASE_SENDER_ID: ''
  _FIREBASE_APP_ID: ''
  _MAPS_API_KEY: ''
  _BACKEND_URL: ''
