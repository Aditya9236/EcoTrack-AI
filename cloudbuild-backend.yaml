# Cloud Build — Backend
# Builds and deploys the FastAPI backend to Cloud Run
steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/ecotrack-backend:$COMMIT_SHA
      - ./backend

  # 2. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/ecotrack-backend:$COMMIT_SHA

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ecotrack-backend
      - --image=gcr.io/$PROJECT_ID/ecotrack-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest

images:
  - gcr.io/$PROJECT_ID/ecotrack-backend:$COMMIT_SHA
